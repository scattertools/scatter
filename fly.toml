# fly.toml app configuration file generated for scatter-coordinator on 2026-06-28T17:15:31-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'scatter-coordinator'
primary_region = 'lax'

[build]
  dockerfile = 'apps/coordinator/Dockerfile'

[env]
  DATABASE_PATH = '/data/scatter.db'
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '4000'
  TRUST_PROXY = 'true'

[[mounts]]
  source = 'scatter_data'
  destination = '/data'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
